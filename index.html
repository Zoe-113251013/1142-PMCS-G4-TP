<!DOCTYPE html>
<html lang="zh" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H&M 企業入口網站 | G4 TP Final</title>
    
    <!-- 引入 Google Fonts: Lora (英文) 與 Noto Serif TC (繁體中文宋體) 以呈現高級精品感，並確保符號正常 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600;700;900&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

    <!-- 引入 Tailwind CSS 進行版面與響應式設計 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // 啟用基於 class 的深色模式
            theme: {
                extend: {
                    fontFamily: {
                        // 覆寫預設的 sans 字體族，優先使用 Lora 與 Noto Serif TC，維持高級雜誌感且符號清晰
                        sans: ['"Lora"', '"Noto Serif TC"', 'ui-serif', 'Georgia', 'serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- 引入 React 與 ReactDOM (不需要構建工具) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 引入 Babel 使得瀏覽器能直接解析 JSX 語法 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 引入 Lucide 圖示庫 -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* 美化捲軸，符合現代化 SPA 設計 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        body { margin: 0; padding: 0; overflow: hidden; }
    </style>
</head>
<body>
    <!-- React 應用程式將會渲染在這個 div 裡面 -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 圖示包裝器 (Icon Wrapper) ---
        // 這個元件用來將 Lucide 圖示動態生成並整合進 React 中
        const Icon = ({ name, size = 24, className = '' }) => {
            const ref = useRef();
            useEffect(() => {
                if (ref.current && window.lucide && window.lucide.icons[name]) {
                    ref.current.innerHTML = '';
                    const svg = window.lucide.createElement(window.lucide.icons[name]);
                    svg.setAttribute('width', size);
                    svg.setAttribute('height', size);
                    ref.current.appendChild(svg);
                }
            }, [name, size]);
            return <span ref={ref} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        // 定義所有使用到的圖示
        const Search = (props) => <Icon name="Search" {...props} />;
        const Bell = (props) => <Icon name="Bell" {...props} />;
        const User = (props) => <Icon name="User" {...props} />;
        const Home = (props) => <Icon name="Home" {...props} />;
        const ArrowLeft = (props) => <Icon name="ArrowLeft" {...props} />;
        const CheckSquare = (props) => <Icon name="CheckSquare" {...props} />;
        const BarChart2 = (props) => <Icon name="BarChart2" {...props} />;
        const ShoppingCart = (props) => <Icon name="ShoppingCart" {...props} />;
        const Users = (props) => <Icon name="Users" {...props} />;
        const Briefcase = (props) => <Icon name="Briefcase" {...props} />;
        const MoreVertical = (props) => <Icon name="MoreVertical" {...props} />;
        const Filter = (props) => <Icon name="Filter" {...props} />;
        const Menu = (props) => <Icon name="Menu" {...props} />;
        const X = (props) => <Icon name="X" {...props} />;
        const Globe = (props) => <Icon name="Globe" {...props} />;
        const Moon = (props) => <Icon name="Moon" {...props} />;
        const Sun = (props) => <Icon name="Sun" {...props} />;
        const Volume2 = (props) => <Icon name="Volume2" {...props} />;
        const Settings = (props) => <Icon name="Settings" {...props} />;
        const HelpCircle = (props) => <Icon name="HelpCircle" {...props} />;
        const Clock = (props) => <Icon name="Clock" {...props} />;
        const Network = (props) => <Icon name="Network" {...props} />;
        const PieChart = (props) => <Icon name="PieChart" {...props} />;
        const BookOpen = (props) => <Icon name="BookOpen" {...props} />;
        const Mail = (props) => <Icon name="Mail" {...props} />;
        const Download = (props) => <Icon name="Download" {...props} />;
        const FileText = (props) => <Icon name="FileText" {...props} />;

        // --- TRANSLATIONS (中英雙語字典) ---
        const translations = {
            en: {
                appTitle: "H&M Portal",
                home: "Home",
                myApps: "G4 TP Final",
                teamIntro: "Team Introduction",
                teamIntroSub: "Core Members",
                companyHistory: "Company History",
                companyHistorySub: "Milestones",
                orgStructure: "Org Structure",
                orgStructureSub: "Divisions & Functions",
                financialInfo: "Financial Info",
                financialInfoSub: "Revenue & Reports",
                jobOpenings: "Job Openings",
                jobOpeningsSub: "Active Positions",
                terminology: "Terminology",
                terminologySub: "Core Domain Words",
                items: "Items",
                searchPlaceholder: "Search...",
                voiceGuide: "Voice Guide",
                toggleTheme: "Toggle Theme",
                switchLang: "Switch Language",
                placeholderMsg: "This is a placeholder for the application.",
                selectItem: "Select an item from the list to view details",
                totalAmount: "Total Amount",
                status: "Status",
                orderDate: "Order Date",
                priority: "Priority",
                shippingDetails: "Shipping Details",
                contactPerson: "Contact Person",
                lineItems: "Line Items",
                product: "Product",
                quantity: "Qty",
                unitPrice: "Unit Price",
                total: "Total",
                sidebarMenu: "Main Menu",
                settings: "Settings",
                help: "Help & Support",
                allRightsReserved: "All rights reserved.",
                privacy: "Privacy Policy",
                terms: "Terms of Use",
                contact: "Contact Us",
                aboutHM: "About H&M",
                aboutText: "H&M Hennes & Mauritz AB was founded in Sweden in 1947 and is quoted on Nasdaq Stockholm. H&M’s business idea is to offer fashion and quality at the best price in a sustainable way. In addition to H&M, the group includes several other brands as well as sustainable initiatives.",
                financialOverview: "Annual Reports & Sustainability",
                reportDesc: "Our annual and sustainability reports provide a comprehensive overview of H&M Group's financial performance, corporate governance, and continuous efforts towards a sustainable fashion future.",
                latestReports: "Latest Reports",
                archive: "Archived Reports",
                downloadReport: "Download PDF",
                historyTitle: "Our Heritage",
                historyDesc: "From a single women's wear store in Sweden to one of the largest fashion retailers worldwide."
            },
            zh: {
                appTitle: "H&M 企業入口網站",
                home: "首頁",
                myApps: "G4 TP Final",
                teamIntro: "小組成員介紹",
                teamIntroSub: "團隊核心成員",
                companyHistory: "公司歷史",
                companyHistorySub: "發展歷程",
                orgStructure: "組織架構",
                orgStructureSub: "事業與功能層級單位等",
                financialInfo: "財務資訊",
                financialInfoSub: "營收與財報",
                jobOpenings: "職缺資料",
                jobOpeningsSub: "招募中職缺",
                terminology: "核心領域詞彙",
                terminologySub: "專有名詞與定義",
                items: "個項目",
                searchPlaceholder: "搜尋...",
                voiceGuide: "語音導覽",
                toggleTheme: "切換明暗主題",
                switchLang: "切換語言",
                placeholderMsg: "這是此應用程式的預設佔位內容，後續將加入完整資訊。",
                selectItem: "請從左側清單選擇一個項目以查看詳細資料",
                totalAmount: "總金額",
                status: "處理狀態",
                orderDate: "訂單日期",
                priority: "優先級別",
                shippingDetails: "送貨資訊",
                contactPerson: "聯絡人",
                lineItems: "訂單明細",
                product: "產品名稱",
                quantity: "數量",
                unitPrice: "單價",
                total: "總計",
                sidebarMenu: "主選單",
                settings: "系統設定",
                help: "說明與支援",
                allRightsReserved: "保留所有權利。",
                privacy: "隱私權政策",
                terms: "使用條款",
                contact: "聯絡我們",
                aboutHM: "關於 H&M",
                aboutText: "H&M Hennes & Mauritz AB 創立於 1947 年的瑞典，以「永續且以優惠的價格提供時尚與品質」為商業理念。作為全球領先的時尚品牌之一，H&M 集團不僅提供豐富多元的服飾選擇，更致力於推動時尚產業的永續發展與創新。",
                financialOverview: "年度報告與永續發展",
                reportDesc: "我們的年度與永續發展報告提供了 H&M 集團財務績效、公司治理，以及我們為實現永續時尚未來所作努力的全面性概述。您可以於此下載近期的完整報告。",
                latestReports: "最新報告",
                archive: "歷年報告存檔",
                downloadReport: "下載 PDF",
                historyTitle: "品牌歷史與傳承",
                historyDesc: "從瑞典的一家女裝店，發展成為全球最大的時尚零售商之一。"
            }
        };

        // --- MOCK DATA ---
        const mockOrders = [
            { id: 'SO-1001', customer: 'TechCorp Inc.', amount: '$12,450.00', status: 'Approved', statusZh: '已核准', date: 'Oct 12, 2023', priority: 'High', priorityZh: '高' },
            { id: 'SO-1002', customer: 'Global Dynamics', amount: '$4,320.00', status: 'Pending', statusZh: '待處理', date: 'Oct 14, 2023', priority: 'Medium', priorityZh: '中' },
            { id: 'SO-1003', customer: 'Acme Corp', amount: '$8,900.50', status: 'In Review', statusZh: '審核中', date: 'Oct 15, 2023', priority: 'Low', priorityZh: '低' },
            { id: 'SO-1004', customer: 'Stark Industries', amount: '$45,000.00', status: 'Approved', statusZh: '已核准', date: 'Oct 16, 2023', priority: 'High', priorityZh: '高' },
        ];

        // --- COMPONENTS ---

        // 1. Fiori Shell Bar (Global Header)
        const ShellBar = ({ navigateTo, currentView, toggleSidebar, lang, setLang, theme, setTheme, announcePage, dict }) => (
            <header className="fixed top-0 left-0 right-0 h-12 bg-[#e50010] dark:bg-gray-950 text-white flex items-center justify-between px-3 z-50 shadow-md transition-colors duration-300">
                <div className="flex items-center gap-2 sm:gap-4">
                    <button onClick={toggleSidebar} className="p-1.5 hover:bg-white/20 rounded transition-colors" aria-label={dict.sidebarMenu}>
                        <Menu size={20} />
                    </button>

                    {currentView !== 'launchpad' ? (
                        <button onClick={() => navigateTo('launchpad')} className="p-1.5 hover:bg-white/20 rounded-full transition-colors" title={dict.home}>
                            <ArrowLeft size={20} />
                        </button>
                    ) : (
                        <div className="w-8 h-8 flex items-center justify-center">
                            <Home size={20} className="text-white" />
                        </div>
                    )}
                    <h1 className="font-semibold text-sm sm:text-base hidden sm:block cursor-pointer tracking-wide" onClick={() => navigateTo('launchpad')}>
                        {dict.appTitle}
                    </h1>
                </div>
                
                <div className="flex items-center gap-1 sm:gap-2">
                    <button onClick={announcePage} className="p-2 hover:bg-white/20 rounded-full transition-colors" title={dict.voiceGuide}>
                        <Volume2 size={18} />
                    </button>
                    <button onClick={() => setTheme(theme === 'light' ? 'dark' : 'light')} className="p-2 hover:bg-white/20 rounded-full transition-colors" title={dict.toggleTheme}>
                        {theme === 'light' ? <Moon size={18} /> : <Sun size={18} />}
                    </button>
                    <button onClick={() => setLang(lang === 'en' ? 'zh' : 'en')} className="p-2 hover:bg-white/20 rounded-full transition-colors flex items-center gap-1" title={dict.switchLang}>
                        <Globe size={18} />
                        <span className="text-xs font-medium hidden sm:block">{lang === 'en' ? 'EN' : '中'}</span>
                    </button>
                    
                    <div className="w-px h-5 bg-white/30 mx-1 hidden sm:block"></div>
                    
                    <button className="p-2 hover:bg-white/20 rounded-full transition-colors relative hidden sm:block">
                        <Bell size={18} />
                        <span className="absolute top-1.5 right-1.5 w-2 h-2 bg-yellow-400 rounded-full border border-[#e50010]"></span>
                    </button>
                    <button className="p-2 hover:bg-white/20 rounded-full transition-colors">
                        <User size={18} />
                    </button>
                </div>
            </header>
        );

        // 2. Sidebar / Hamburger Menu
        const Sidebar = ({ isOpen, toggleSidebar, dict, navigateTo, apps }) => (
            <React.Fragment>
                {isOpen && (
                    <div className="fixed inset-0 bg-black/50 z-50 transition-opacity" onClick={toggleSidebar} />
                )}
                <div className={`fixed inset-y-0 left-0 w-64 bg-white dark:bg-gray-800 shadow-2xl z-50 transform ${isOpen ? 'translate-x-0' : '-translate-x-full'} transition-transform duration-300 ease-in-out flex flex-col`}>
                    <div className="h-12 flex items-center justify-between px-4 bg-[#e50010] dark:bg-gray-950 text-white shrink-0">
                        <span className="font-semibold">{dict.sidebarMenu}</span>
                        <button onClick={toggleSidebar} className="p-1 hover:bg-white/20 rounded">
                            <X size={20} />
                        </button>
                    </div>
                    <div className="flex-1 overflow-y-auto py-2">
                        <button onClick={() => { navigateTo('launchpad'); toggleSidebar(); }} className="w-full flex items-center gap-3 px-4 py-3 text-left text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                            <Home size={18} className="text-gray-500 dark:text-gray-400" />
                            <span>{dict.home}</span>
                        </button>

                        {apps && apps.length > 0 && (
                            <React.Fragment>
                                <div className="px-4 pt-4 pb-1">
                                    <span className="text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider">
                                        {dict.myApps}
                                    </span>
                                </div>
                                {apps.map(app => {
                                    const AppIcon = app.icon;
                                    return (
                                        <button 
                                            key={app.id}
                                            onClick={() => { navigateTo('app', app); toggleSidebar(); }} 
                                            className="w-full flex items-center gap-3 px-4 py-3 text-left text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
                                        >
                                            <AppIcon size={18} className="text-gray-500 dark:text-gray-400 opacity-80" />
                                            <span className="text-sm">{app.title}</span>
                                        </button>
                                    );
                                })}
                                <div className="my-2 border-t border-gray-100 dark:border-gray-700"></div>
                            </React.Fragment>
                        )}

                        <button className="w-full flex items-center gap-3 px-4 py-3 text-left text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                            <Settings size={18} className="text-gray-500 dark:text-gray-400" />
                            <span>{dict.settings}</span>
                        </button>
                        <button className="w-full flex items-center gap-3 px-4 py-3 text-left text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                            <HelpCircle size={18} className="text-gray-500 dark:text-gray-400" />
                            <span>{dict.help}</span>
                        </button>
                    </div>
                </div>
            </React.Fragment>
        );

        // 3. Fiori Tile Component
        const FioriTile = ({ app, onClick, dict }) => {
            const AppIcon = app.icon;
            return (
                <button 
                    onClick={() => onClick(app)}
                    className="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-4 w-full h-44 flex flex-col justify-between text-left shadow-sm hover:shadow-md dark:hover:shadow-gray-900 transition-all group focus:outline-none focus:ring-2 focus:ring-[#e50010] active:scale-95"
                >
                    <div>
                        <div className="flex justify-between items-start mb-2">
                            <AppIcon size={32} className={`${app.color} opacity-80 group-hover:opacity-100 transition-opacity`} />
                            <span className="text-xs font-semibold text-gray-500 dark:text-gray-400">{app.info}</span>
                        </div>
                        <h3 className="text-gray-800 dark:text-gray-100 font-semibold text-lg leading-tight mt-2 group-hover:text-[#e50010] dark:group-hover:text-red-400 transition-colors">
                            {app.title}
                        </h3>
                        <p className="text-gray-500 dark:text-gray-400 text-sm mt-1">{app.subtitle}</p>
                    </div>
                    <div className="w-full h-1 bg-transparent group-hover:bg-[#e50010] transition-colors mt-2 rounded-full"></div>
                </button>
            );
        };

        // 4. Master-Detail Application (Responsive Pattern)
        const MasterDetailApp = ({ appData, dict, lang }) => {
            const [selectedItem, setSelectedItem] = useState(mockOrders[0]);
            const [showMobileDetail, setShowMobileDetail] = useState(false);

            const handleSelectItem = (item) => {
                setSelectedItem(item);
                setShowMobileDetail(true);
            };

            const statusColors = {
                'Approved': 'bg-green-100 text-green-800 border-green-200 dark:bg-green-900/30 dark:text-green-300 dark:border-green-800',
                'Pending': 'bg-yellow-100 text-yellow-800 border-yellow-200 dark:bg-yellow-900/30 dark:text-yellow-300 dark:border-yellow-800',
                'In Review': 'bg-blue-100 text-blue-800 border-blue-200 dark:bg-blue-900/30 dark:text-blue-300 dark:border-blue-800',
            };

            return (
                <div className="flex flex-1 overflow-hidden bg-[#f4f4f5] dark:bg-gray-900">
                    {/* MASTER LIST (Left Panel) */}
                    <div className={`w-full md:w-[320px] lg:w-[380px] bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col transition-transform duration-300 ${showMobileDetail ? 'hidden md:flex' : 'flex'}`}>
                        <div className="h-12 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-4 bg-gray-50 dark:bg-gray-800/80 shrink-0">
                            <h2 className="font-semibold text-gray-800 dark:text-gray-200 truncate">{appData.title} ({mockOrders.length})</h2>
                            <button className="p-1.5 text-[#e50010] dark:text-red-400 hover:bg-red-50 dark:hover:bg-gray-700 rounded"><Filter size={18} /></button>
                        </div>
                        
                        <div className="p-2 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800">
                            <div className="relative">
                                <Search className="absolute left-2.5 top-2.5 text-gray-400" size={16} />
                                <input 
                                    type="text" 
                                    placeholder={dict.searchPlaceholder} 
                                    className="w-full bg-gray-100 dark:bg-gray-700 dark:text-white border-transparent rounded-md py-1.5 pl-8 pr-3 text-sm focus:bg-white dark:focus:bg-gray-600 focus:border-[#e50010] focus:ring-1 focus:ring-[#e50010] outline-none transition-all"
                                />
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto">
                            {mockOrders.map(order => (
                                <button
                                    key={order.id}
                                    onClick={() => handleSelectItem(order)}
                                    className={`w-full text-left p-3 border-b border-gray-100 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 flex items-center justify-between transition-colors
                                        ${selectedItem?.id === order.id ? 'bg-red-50 dark:bg-red-900/20 border-l-4 border-l-[#e50010] dark:border-l-red-500' : 'border-l-4 border-l-transparent dark:border-l-transparent'}
                                    `}
                                >
                                    <div className="overflow-hidden">
                                        <div className="font-semibold text-gray-800 dark:text-gray-200 text-sm truncate">{order.customer}</div>
                                        <div className="text-gray-500 dark:text-gray-400 text-xs mt-0.5">{order.id} • {order.date}</div>
                                    </div>
                                    <div className="flex flex-col items-end shrink-0 pl-2">
                                        <span className="font-medium text-sm text-gray-700 dark:text-gray-300">{order.amount}</span>
                                        <span className={`text-[10px] px-1.5 py-0.5 rounded border mt-1 font-medium ${statusColors[order.status]}`}>
                                            {lang === 'zh' ? order.statusZh : order.status}
                                        </span>
                                    </div>
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* DETAIL VIEW (Right Panel) */}
                    <div className={`flex-1 flex flex-col bg-gray-50 dark:bg-gray-900/50 ${!showMobileDetail ? 'hidden md:flex' : 'flex'}`}>
                        <div className="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-6 py-5 shadow-sm shrink-0">
                            <div className="flex items-start justify-between">
                                <div className="flex items-center gap-3">
                                    <button onClick={() => setShowMobileDetail(false)} className="md:hidden mr-2 p-2 -ml-2 text-[#e50010] dark:text-red-400 hover:bg-red-50 dark:hover:bg-gray-700 rounded-full">
                                        <ArrowLeft size={20} />
                                    </button>
                                    <div>
                                        <h2 className="text-2xl font-light text-gray-800 dark:text-gray-100">{selectedItem?.customer || dict.selectItem}</h2>
                                        <p className="text-sm text-gray-500 dark:text-gray-400 mt-1">Order ID: {selectedItem?.id}</p>
                                    </div>
                                </div>
                            </div>
                            
                            {selectedItem && (
                                <div className="flex flex-wrap gap-8 mt-6">
                                    <div>
                                        <p className="text-xs text-gray-500 dark:text-gray-400 mb-1">{dict.totalAmount}</p>
                                        <p className="text-lg font-semibold text-gray-800 dark:text-gray-200">{selectedItem.amount}</p>
                                    </div>
                                    <div>
                                        <p className="text-xs text-gray-500 dark:text-gray-400 mb-1">{dict.status}</p>
                                        <span className={`text-xs px-2 py-1 rounded border font-medium ${statusColors[selectedItem.status]}`}>
                                            {lang === 'zh' ? selectedItem.statusZh : selectedItem.status}
                                        </span>
                                    </div>
                                    <div>
                                        <p className="text-xs text-gray-500 dark:text-gray-400 mb-1">{dict.orderDate}</p>
                                        <p className="text-sm font-medium text-gray-800 dark:text-gray-200">{selectedItem.date}</p>
                                    </div>
                                    <div>
                                        <p className="text-xs text-gray-500 dark:text-gray-400 mb-1">{dict.priority}</p>
                                        <p className="text-sm font-medium text-gray-800 dark:text-gray-200">{lang === 'zh' ? selectedItem.priorityZh : selectedItem.priority}</p>
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="flex-1 overflow-y-auto p-6">
                            {selectedItem ? (
                                <div className="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 shadow-sm p-6 max-w-4xl">
                                    <h3 className="text-lg font-medium text-gray-800 dark:text-gray-200 mb-4 border-b border-gray-100 dark:border-gray-700 pb-2">{dict.shippingDetails}</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div>
                                            <h4 className="text-sm font-semibold text-gray-600 dark:text-gray-400 mb-2">{dict.shippingDetails}</h4>
                                            <p className="text-sm text-gray-800 dark:text-gray-300">123 Business Road<br/>Enterprise City, EC 90210<br/>United States</p>
                                        </div>
                                        <div>
                                            <h4 className="text-sm font-semibold text-gray-600 dark:text-gray-400 mb-2">{dict.contactPerson}</h4>
                                            <p className="text-sm text-gray-800 dark:text-gray-300">Jane Doe<br/>jane.doe@example.com<br/>+1 (555) 123-4567</p>
                                        </div>
                                    </div>
                                    
                                    <h3 className="text-lg font-medium text-gray-800 dark:text-gray-200 mt-8 mb-4 border-b border-gray-100 dark:border-gray-700 pb-2">{dict.lineItems}</h3>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-sm text-gray-600 dark:text-gray-300">
                                            <thead className="bg-gray-50 dark:bg-gray-800 border-y border-gray-200 dark:border-gray-700">
                                                <tr>
                                                    <th className="px-4 py-3 font-semibold text-gray-700 dark:text-gray-300">{dict.product}</th>
                                                    <th className="px-4 py-3 font-semibold text-gray-700 dark:text-gray-300">{dict.quantity}</th>
                                                    <th className="px-4 py-3 font-semibold text-gray-700 dark:text-gray-300">{dict.unitPrice}</th>
                                                    <th className="px-4 py-3 font-semibold text-gray-700 dark:text-gray-300 text-right">{dict.total}</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-100 dark:divide-gray-700">
                                                <tr className="hover:bg-gray-50 dark:hover:bg-gray-700/50">
                                                    <td className="px-4 py-3">Enterprise Server Rack</td>
                                                    <td className="px-4 py-3">2</td>
                                                    <td className="px-4 py-3">$4,000.00</td>
                                                    <td className="px-4 py-3 text-right font-medium text-gray-800 dark:text-gray-200">$8,000.00</td>
                                                </tr>
                                                <tr className="hover:bg-gray-50 dark:hover:bg-gray-700/50">
                                                    <td className="px-4 py-3">Network Switch</td>
                                                    <td className="px-4 py-3">5</td>
                                                    <td className="px-4 py-3">$890.00</td>
                                                    <td className="px-4 py-3 text-right font-medium text-gray-800 dark:text-gray-200">$4,450.00</td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            ) : (
                                <div className="h-full flex items-center justify-center text-gray-400 dark:text-gray-600 flex-col">
                                    <CheckSquare size={48} className="mb-4 opacity-50" />
                                    <p>{dict.selectItem}</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // 4.3 Company History Application (公司歷史專屬頁面)
        const CompanyHistoryApp = ({ appData, dict, lang }) => {
            const milestones = [
                {
                    year: '1947',
                    title: lang === 'zh' ? 'Hennes 創立' : 'The Founding of Hennes',
                    desc: lang === 'zh' 
                        ? 'Erling Persson 在瑞典的韋斯特羅斯 (Västerås) 開設了第一家店鋪。這家店最初名為 Hennes（瑞典語意為「她的」），當時只專門提供女裝。這也是 H&M 致力於「以永續方式提供最棒的產品與體驗」的起點。' 
                        : 'Erling Persson opened the first store in 1947 in Västerås, Sweden. The store was originally called Hennes (“hers” in Swedish) and only offered women\'s wear.'
                },
                {
                    year: '1968',
                    title: lang === 'zh' ? '收購 Mauritz Widforss 並更名' : 'Acquisition of Mauritz Widforss',
                    desc: lang === 'zh' 
                        ? '公司收購了狩獵服飾品牌 Mauritz Widforss，這次的收購促使品牌開始提供男裝系列，並正式將公司名稱更改為我們現今熟知的 H&M (Hennes & Mauritz)。' 
                        : 'In 1968 the company acquired Mauritz Widforss, a hunting apparel company, which led to the store offering men’s apparel and the change of the name to Hennes & Mauritz.'
                },
                {
                    year: lang === 'zh' ? '今日' : 'Present',
                    title: lang === 'zh' ? '全球頂尖時尚零售商' : 'Global Fashion Retailer',
                    desc: lang === 'zh' 
                        ? '如今，H&M 已成為全球最大的時尚零售商之一。H&M 經常與高端知名設計師合作推出聯名系列，並與名人攜手進行引領潮流的行銷活動，持續讓顧客能夠展現獨特的個人風格。' 
                        : 'H&M is among the largest fashion retailers worldwide. The company is committed to providing in a sustainable manner the best offerings and experience to customers so that they can dress according to their personal style. H&M collaborates with high-end designers and runs marketing campaigns with celebrities.'
                }
            ];

            return (
                <div className="p-6 md:p-8 max-w-4xl mx-auto animate-in fade-in duration-300 w-full">
                    {/* 頁面標題區 */}
                    <div className="text-center mb-16 mt-8">
                        <div className="inline-flex items-center justify-center w-16 h-16 bg-red-50 dark:bg-red-900/30 text-[#e50010] dark:text-red-400 rounded-full mb-6">
                            <Clock size={32} />
                        </div>
                        <h2 className="text-4xl font-bold text-gray-800 dark:text-gray-100 tracking-wider font-serif mb-4">{dict.historyTitle}</h2>
                        <p className="text-gray-500 dark:text-gray-400 max-w-2xl mx-auto text-lg">{dict.historyDesc}</p>
                    </div>

                    {/* 時間軸區塊 */}
                    <div className="relative border-l border-gray-200 dark:border-gray-700 ml-4 md:ml-8">
                        {milestones.map((item, index) => (
                            <div key={index} className="mb-12 ml-8 md:ml-12 relative group">
                                {/* 時間軸節點 */}
                                <span className="absolute -left-[41px] md:-left-[57px] flex items-center justify-center w-5 h-5 rounded-full bg-white dark:bg-gray-900 border-4 border-gray-200 dark:border-gray-700 group-hover:border-[#e50010] dark:group-hover:border-red-500 transition-colors ring-4 ring-white dark:ring-gray-900">
                                </span>
                                
                                <div className="bg-white dark:bg-gray-800 p-6 md:p-8 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 hover:shadow-md dark:hover:shadow-gray-900 transition-shadow">
                                    <h3 className="text-[#e50010] dark:text-red-400 font-bold text-2xl mb-2 font-serif">{item.year}</h3>
                                    <h4 className="text-xl font-bold text-gray-800 dark:text-gray-100 mb-4">{item.title}</h4>
                                    <p className="text-gray-600 dark:text-gray-300 leading-relaxed text-base md:text-lg">
                                        {item.desc}
                                    </p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // 4.5 Global Footer (全域資訊欄)
        const Footer = ({ dict }) => {
            const year = new Date().getFullYear();
            return (
                <footer className="bg-white dark:bg-gray-950 border-t border-gray-200 dark:border-gray-800 py-4 shrink-0 transition-colors duration-300 z-40 relative">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-3">
                        <div className="flex items-center gap-3">
                            <span className="font-bold text-xl tracking-widest text-[#e50010]">H&M</span>
                            <span className="text-xs sm:text-sm text-gray-500 dark:text-gray-400 border-l pl-3 border-gray-300 dark:border-gray-700">
                                © {year} H&M Hennes & Mauritz AB. {dict.allRightsReserved}
                            </span>
                        </div>
                        <div className="flex items-center gap-4 sm:gap-6 text-xs sm:text-sm">
                            <a href="#" className="text-gray-600 dark:text-gray-300 hover:text-[#e50010] dark:hover:text-red-400 transition-colors">{dict.privacy}</a>
                            <a href="#" className="text-gray-600 dark:text-gray-300 hover:text-[#e50010] dark:hover:text-red-400 transition-colors">{dict.terms}</a>
                            <a href="#" className="text-gray-600 dark:text-gray-300 hover:text-[#e50010] dark:hover:text-red-400 transition-colors">{dict.contact}</a>
                        </div>
                    </div>
                </footer>
            );
        };

        // 5. Main Application Container
        function App() {
            const [currentView, setCurrentView] = useState('launchpad');
            const [selectedApp, setSelectedApp] = useState(null);
            const [lang, setLang] = useState('zh');
            const [theme, setTheme] = useState('light');
            const [isSidebarOpen, setSidebarOpen] = useState(false);

            // 處理深淺色模式的切換 (注入到 HTML 標籤上以便 Tailwind 識別)
            useEffect(() => {
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [theme]);

            const dict = translations[lang];

            const getLaunchpadTiles = () => [
                { id: 'team', title: dict.teamIntro, subtitle: dict.teamIntroSub, icon: Users, info: '', color: 'text-[#e50010]', type: 'placeholder' },
                { id: 'history', title: dict.companyHistory, subtitle: dict.companyHistorySub, icon: Clock, info: '', color: 'text-gray-800 dark:text-gray-300', type: 'placeholder' },
                { id: 'structure', title: dict.orgStructure, subtitle: dict.orgStructureSub, icon: Network, info: '', color: 'text-gray-800 dark:text-gray-300', type: 'placeholder' },
                { id: 'finance', title: dict.financialInfo, subtitle: dict.financialInfoSub, icon: PieChart, info: '', color: 'text-gray-800 dark:text-gray-300', type: 'placeholder' },
                { id: 'jobs', title: dict.jobOpenings, subtitle: dict.jobOpeningsSub, icon: Briefcase, info: '', color: 'text-[#e50010]', type: 'placeholder' },
                { id: 'terminology', title: dict.terminology, subtitle: dict.terminologySub, icon: BookOpen, info: '', color: 'text-gray-800 dark:text-gray-300', type: 'placeholder' },
            ];

            const navigateTo = (view, appData = null) => {
                setCurrentView(view);
                setSelectedApp(appData);
            };

            const announcePage = () => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const textToRead = currentView === 'launchpad' 
                        ? (lang === 'zh' ? `目前在首頁。您可以選擇：${getLaunchpadTiles().map(t => t.title).join('、')}` : `Currently on Home. You can select: ${getLaunchpadTiles().map(t => t.title).join(', ')}`)
                        : (lang === 'zh' ? `目前開啟的是 ${selectedApp.title} 應用程式` : `Currently open ${selectedApp.title} application`);

                    const utterance = new SpeechSynthesisUtterance(textToRead);
                    utterance.lang = lang === 'zh' ? 'zh-TW' : 'en-US';
                    utterance.rate = 1.1;
                    window.speechSynthesis.speak(utterance);
                } else {
                    alert(lang === 'zh' ? '您的瀏覽器不支援語音導覽功能。' : 'Your browser does not support text-to-speech.');
                }
            };

            return (
                <div className="h-screen flex flex-col bg-[#f4f4f5] dark:bg-gray-900 font-sans antialiased selection:bg-red-200 dark:selection:bg-red-900 transition-colors duration-300 overflow-hidden">
                    <Sidebar isOpen={isSidebarOpen} toggleSidebar={() => setSidebarOpen(!isSidebarOpen)} dict={dict} navigateTo={navigateTo} apps={getLaunchpadTiles()} />
                    
                    <ShellBar 
                        navigateTo={navigateTo} 
                        currentView={currentView} 
                        toggleSidebar={() => setSidebarOpen(true)}
                        lang={lang} setLang={setLang}
                        theme={theme} setTheme={setTheme}
                        announcePage={announcePage}
                        dict={dict}
                    />
                    
                    <main className="mt-12 flex-1 overflow-y-auto flex flex-col relative">
                        {currentView === 'launchpad' && (
                            <div className="p-6 md:p-8 max-w-7xl w-full mx-auto animate-in fade-in duration-300 flex-1">
                                <div className="mb-6">
                                    <h2 className="text-2xl font-normal text-gray-800 dark:text-gray-100">{dict.home}</h2>
                                    <div className="mt-4 p-6 bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-100 dark:border-gray-700">
                                        <h3 className="text-lg font-semibold text-[#e50010] mb-2">{dict.aboutHM}</h3>
                                        <p className="text-gray-600 dark:text-gray-300 text-sm leading-relaxed">{dict.aboutText}</p>
                                    </div>
                                </div>
                                <div className="mb-8 mt-10">
                                    <h3 className="text-gray-600 dark:text-gray-400 text-sm font-semibold uppercase tracking-wider mb-4 border-b border-gray-200 dark:border-gray-700 pb-2">{dict.myApps}</h3>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                                        {getLaunchpadTiles().map(app => (
                                            <FioriTile key={app.id} app={app} onClick={(appData) => navigateTo('app', appData)} dict={dict} />
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        {currentView === 'app' && selectedApp && (
                            <div className="animate-in slide-in-from-right-4 duration-300 ease-out h-full">
                                {selectedApp.id === 'team' ? (
                                    <TeamIntroApp appData={selectedApp} dict={dict} lang={lang} />
                                ) : selectedApp.id === 'history' ? (
                                    <CompanyHistoryApp appData={selectedApp} dict={dict} lang={lang} />
                                ) : selectedApp.id === 'finance' ? (
                                    <FinancialInfoApp appData={selectedApp} dict={dict} lang={lang} />
                                ) : selectedApp.type === 'master-detail' ? (
                                    <MasterDetailApp appData={selectedApp} dict={dict} lang={lang} />
                                ) : (
                                    <div className="p-8 text-center mt-20">
                                        <div className="inline-flex items-center justify-center w-20 h-20 bg-white dark:bg-gray-800 rounded-full shadow-md mb-6 text-[#e50010] dark:text-red-400">
                                            {React.createElement(selectedApp.icon, { size: 40 })}
                                        </div>
                                        <h2 className="text-2xl font-semibold text-gray-800 dark:text-gray-100">{selectedApp.title}</h2>
                                        <p className="text-gray-500 dark:text-gray-400 mt-2">{dict.placeholderMsg}</p>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    <Footer dict={dict} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
